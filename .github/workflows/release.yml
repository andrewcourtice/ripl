name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write        # create the GitHub Release for the tag
  id-token: write        # build provenance

jobs:
  release:
    name: 'Stage publish to npm (dist-tag: next)'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test

      # Stage the release: publish every un-published version under the `next`
      # dist-tag. `latest` is untouched, so `npm install @ripl/*` is unaffected
      # until the Promote workflow moves this version to `latest`.
      - name: 'Stage publish (dist-tag: next)'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: yarn lerna publish from-package --yes --dist-tag next

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          pre=""
          case "$tag" in
            *-*) pre="--prerelease" ;;
          esac
          if gh release view "$tag" > /dev/null 2>&1; then
            echo "Release $tag already exists, skipping"
          else
            gh release create "$tag" --title "$tag" --generate-notes --verify-tag $pre
          fi
