<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ripl Devtools Example</title>
    <style>
        :root {
            color-scheme: light dark;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f4f6f8;
            color: #202124;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #1b1c1f;
                color: #e8eaed;
            }
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(128, 128, 128, 0.25);
        }

        h1 {
            margin: 0;
            font-size: 16px;
        }

        button {
            font: inherit;
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            background: #459bf1;
            color: #fff;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.5;
            cursor: default;
        }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        section h2 {
            margin: 0 0 8px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.7;
        }

        .mount {
            height: 320px;
            border: 1px solid rgba(128, 128, 128, 0.25);
            border-radius: 8px;
            background: #fff;
            overflow: hidden;
        }

        @media (prefers-color-scheme: dark) {
            .mount {
                background: #26282b;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Ripl devtools example</h1>
        <button id="spawn" type="button">Spawn 2,000 elements</button>
    </header>
    <main>
        <section>
            <h2>Canvas</h2>
            <div id="canvas-mount" class="mount"></div>
        </section>
        <section>
            <h2>SVG</h2>
            <div id="svg-mount" class="mount"></div>
        </section>
    </main>
    <script type="module" src="./main.ts"></script>
</body>
</html>
